<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTA別構成比率 推移ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f4f3ef;color:#222;font-size:14px}
.top-bar{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.top-bar h1{font-size:15px;font-weight:600;letter-spacing:.03em}
.top-bar .period{font-size:11px;color:#aaa;margin-left:auto}
.controls{background:#fff;border-bottom:1px solid #e0deda;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.controls label{font-size:12px;color:#555;font-weight:500}
select{font-size:13px;padding:6px 10px;border:1px solid #d0cec9;border-radius:6px;background:#fff;color:#222;cursor:pointer;min-width:280px}
select:focus{outline:2px solid #4a7cde;border-color:transparent}
.fac-note{font-size:11px;color:#888;background:#faf9f6;padding:5px 20px;border-bottom:1px solid #e0deda;min-height:24px}
.ota-toggle-wrap{display:flex;gap:6px;flex-wrap:wrap;padding:10px 20px;background:#faf9f6;border-bottom:1px solid #e0deda;align-items:center}
.ota-toggle-label{font-size:11px;color:#888;margin-right:4px;flex-shrink:0}
.ota-btn{font-size:11px;padding:3px 9px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;font-weight:500;transition:opacity .15s,background .15s}
.ota-btn.active{opacity:1}
.ota-btn:not(.active){opacity:.3}
.ctrl-btn{font-size:11px;padding:3px 9px;border-radius:10px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#555;margin-left:4px}
.ctrl-btn:hover{background:#f0eeea}
.main{padding:20px}
.chart-card{background:#fff;border-radius:10px;border:1px solid #e0deda;padding:20px 20px 16px;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:600;color:#333;margin-bottom:4px}
.chart-sub{font-size:12px;color:#777;margin-bottom:14px}
.chart-wrap{position:relative;height:360px}
.table-card{background:#fff;border-radius:10px;border:1px solid #e0deda;padding:20px;overflow-x:auto;margin-bottom:12px}
.table-card .chart-title{margin-bottom:12px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#f4f3ef;padding:7px 8px;text-align:center;font-weight:600;border-bottom:1px solid #e0deda;white-space:nowrap;color:#555;font-size:11px}
.data-table th.ota-col{text-align:left}
.data-table td{padding:6px 8px;border-bottom:.5px solid #f0eeea;white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums;font-size:12px}
.data-table td.ota-name{text-align:left;font-weight:500;padding-left:10px}
.data-table tr:hover td{background:#f8f7f3}
.data-table tr:last-child td{border-bottom:none}
.footer-note{font-size:11px;color:#999;padding:0 2px 8px}
.no-data{text-align:center;padding:60px 20px;color:#bbb;font-size:13px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📊 OTA別構成比率 推移ダッシュボード</h1>
  <span class="period">対象期間：2025年6月 〜 2026年5月（12ヶ月）</span>
</div>

<div class="controls">
  <label for="fac-select">施設選択</label>
  <select id="fac-select"></select>
</div>

<div class="fac-note" id="fac-note"></div>

<div class="ota-toggle-wrap">
  <span class="ota-toggle-label">OTA表示切替：</span>
  <div id="ota-btns" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
  <button class="ctrl-btn" id="all-on-btn">全ON</button>
  <button class="ctrl-btn" id="all-off-btn">主要のみ</button>
</div>

<div class="main">
  <div class="chart-card">
    <div class="chart-title">OTA別 販売室数構成比率 推移</div>
    <div class="chart-sub" id="chart-sub"></div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="table-card">
    <div class="chart-title">月別データ一覧（%）</div>
    <div id="table-wrap"></div>
  </div>

  <p class="footer-note">
    ※ 構成比は「当該OTA販売室数 ÷ OTA総販売室数」。空欄は当月データなし。<br>
    ※ GV盛岡：2025年6月〜2026年1月はHOTEL JIN 盛岡駅前として集計。GVいわき：〜2026年2月は平ビューホテルとして集計。同一施設として結合表示。
  </p>
</div>

const OTA_COLORS = {
  '楽天トラベル':                '#e83030',
  'じゃらんnet':                 '#ff7a00',
  'Booking.com':                 '#003580',
  'tripla':                      '#00a8c8',
  '一休.com':                    '#8b1a1a',
  'Agoda':                       '#8b44ac',
  'Trip.com Group(new)':         '#0077b6',
  'Expedia':                     '#f5a623',
  'e-concierge(アパ直)':         '#2d7d4f',
  '楽天グローバルプラットフォーム': '#c084fc',
  'るるぶトラベル':               '#b5838d',
  'skyticket':                   '#94a3b8',
};

const MAIN_OTAS = ['楽天トラベル','じゃらんnet','Booking.com','tripla','一休.com',
                   'Agoda','Trip.com Group(new)','Expedia','e-concierge(アパ直)'];

const MONTHS = RAW.months;
const FACILITIES = RAW.facilities;
const DATA = RAW.data;
const GRAPH_OTAS = RAW.graph_otas;
const ALIASES = RAW.name_aliases || {};

let currentFac = null;
let activeOtas = new Set(GRAPH_OTAS);
let chart = null;

// 施設セレクト
const sel = document.getElementById('fac-select');
FACILITIES.forEach(f => {
  const o = document.createElement('option');
  o.value = f; o.textContent = f;
  if (f === 'ホテルグローバルビュー盛岡') o.selected = true;
  sel.appendChild(o);
});

// OTAボタン描画
function buildOtaBtns() {
  const wrap = document.getElementById('ota-btns');
  wrap.innerHTML = '';
  GRAPH_OTAS.forEach(ota => {
    const col = OTA_COLORS[ota] || '#888';
    const btn = document.createElement('button');
    btn.className = 'ota-btn' + (activeOtas.has(ota) ? ' active' : '');
    btn.textContent = ota;
    btn.style.borderColor = col;
    btn.style.color = activeOtas.has(ota) ? '#fff' : col;
    btn.style.background = activeOtas.has(ota) ? col : 'transparent';
    btn.onclick = () => {
      if (activeOtas.has(ota)) { if (activeOtas.size > 1) activeOtas.delete(ota); }
      else activeOtas.add(ota);
      buildOtaBtns(); render(currentFac);
    };
    wrap.appendChild(btn);
  });
}

document.getElementById('all-on-btn').onclick = () => {
  activeOtas = new Set(GRAPH_OTAS); buildOtaBtns(); render(currentFac);
};
document.getElementById('all-off-btn').onclick = () => {
  activeOtas = new Set(MAIN_OTAS); buildOtaBtns(); render(currentFac);
};

function getFacData(fac) {
  const out = {};
  MONTHS.forEach(m => { out[m] = (DATA[m] && DATA[m][fac]) ? DATA[m][fac] : {}; });
  return out;
}

function render(fac) {
  currentFac = fac;
  const facData = getFacData(fac);

  // 施設注記
  const noteEl = document.getElementById('fac-note');
  noteEl.textContent = ALIASES[fac] ? '📌 名称変更あり：' + ALIASES[fac] : '';

  document.getElementById('chart-sub').textContent = fac + '　（構成比率 % / 縦軸）';

  // データあるOTA
  const otasWithData = GRAPH_OTAS.filter(ota =>
    MONTHS.some(m => { const v = facData[m][ota]; return v !== null && v !== undefined && v > 0; })
  );

  const visibleOtas = otasWithData.filter(o => activeOtas.has(o));

  const datasets = visibleOtas.map(ota => {
    const col = OTA_COLORS[ota] || '#888';
    return {
      label: ota,
      data: MONTHS.map(m => {
        const v = facData[m][ota];
        return (v !== undefined && v !== null && v > 0) ? v : null;
      }),
      borderColor: col,
      backgroundColor: col + '20',
      borderWidth: 2.5,
      pointRadius: 5,
      pointHoverRadius: 7,
      tension: 0.25,
      spanGaps: false,
    };
  });

  if (chart) chart.destroy();
  const ctx = document.getElementById('mainChart').getContext('2d');

  if (datasets.length === 0) {
    document.querySelector('.chart-wrap').innerHTML = '<div class="no-data">表示するOTAデータがありません</div>';
    document.getElementById('table-wrap').innerHTML = '';
    return;
  }

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: MONTHS.map(m => m.replace('年','/').replace('月','')), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font:{size:11}, padding:14, usePointStyle:true, pointStyleWidth:10,
            filter: item => item.datasetIndex < 15
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return v !== null ? ` ${ctx.dataset.label}: ${v.toFixed(1)}%` : null;
            },
            afterBody: (items) => {
              const m = MONTHS[items[0].dataIndex];
              const total = otasWithData.reduce((s, ota) => {
                const v = facData[m][ota];
                return s + (v > 0 ? v : 0);
              }, 0);
              return [`──────────`, `表示OTA合計: ${total.toFixed(1)}%`];
            }
          }
        }
      },
      scales: {
        x: { grid:{color:'#f0eeea'}, ticks:{font:{size:11}} },
        y: {
          min: 0,
          ticks: { font:{size:11}, callback: v => v + '%' },
          grid: { color:'#f0eeea' }
        }
      }
    }
  });

  // テーブル
  let html = '<table class="data-table"><thead><tr><th class="ota-col">OTA</th>';
  MONTHS.forEach(m => {
    html += `<th>${m.replace('年','/<br>').replace('月','')}</th>`;
  });
  html += '</tr></thead><tbody>';

  otasWithData.forEach(ota => {
    const col = OTA_COLORS[ota] || '#888';
    const isActive = activeOtas.has(ota);
    html += `<tr style="opacity:${isActive?1:.45}"><td class="ota-name" style="border-left:3px solid ${col}">${ota}</td>`;
    MONTHS.forEach(m => {
      const v = facData[m][ota];
      const disp = (v !== null && v !== undefined && v > 0) ? v.toFixed(1)+'%' : '-';
      const highlight = v >= 30 ? `background:${col}18;font-weight:600` : '';
      html += `<td style="${highlight}">${disp}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

buildOtaBtns();
sel.addEventListener('change', () => render(sel.value));
render(sel.value || FACILITIES[0]);
</script>
